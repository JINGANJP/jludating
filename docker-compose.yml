services:
  postgres:
    image: postgres:15-alpine
    container_name: jludating-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: jludating
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jludating-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
